<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lokly | O Folclore</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <img src="lokly-logo.png" alt="Lokly Logo" class="logo">

    <p class="welcome">
        Welcome to
    </p>

    <h1>
        O Folclore
    </h1>

    <p class="intro">
        Thank you for visiting us today.<br>
        Discover your welcome reward from Lokly.
    </p>

    <div class="menu">

        <button class="card primary" onclick="location.href='reward.html'">

            <div class="icon">
                <i class="fa-solid fa-gift"></i>
            </div>

            <div class="text">
                <h2>Claim Your Reward</h2>
                <p>First visit? Unlock your welcome dining reward.</p>
            </div>

            <div class="arrow">
                <i class="fa-solid fa-chevron-right"></i>
            </div>

        </button>

        <button class="card" onclick="location.href='feedback.html'">

            <div class="icon">
                <i class="fa-regular fa-comment-dots"></i>
            </div>

            <div class="text">
                <h2>Share Your Experience</h2>
                <p>Your feedback helps us improve.</p>
            </div>

            <div class="arrow">
                <i class="fa-solid fa-chevron-right"></i>
            </div>

        </button>

        <button class="card" onclick="location.href='review.html'">

            <div class="icon">
                <i class="fa-regular fa-star"></i>
            </div>

            <div class="text">
                <h2>Leave a Review</h2>
                <p>Enjoyed your visit? We'd love your feedback.</p>
            </div>

            <div class="arrow">
                <i class="fa-solid fa-chevron-right"></i>
            </div>

        </button>

    </div>

    <div class="footer">
        Powered by <strong>Lokly</strong>
    </div>

</div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leave a Review</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="review.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <img src="lokly-logo.png" class="logo" alt="Lokly">

    <div class="success">

        <i class="fa-solid fa-circle-check"></i>

    </div>

    <h1>Thank You!</h1>

    <p class="intro">

        Your private feedback has been sent.

        <br><br>

        If you enjoyed your visit, we'd really appreciate a Google Review.
        It helps other people discover O Folclore.

    </p>

    <a href="https://www.google.com/" target="_blank" class="googleButton">

        <i class="fa-brands fa-google"></i>

        Leave a Google Review

    </a>

    <button class="finish" onclick="window.location.href='index.html'">

        Finish

    </button>

</div>

</body>

</html>

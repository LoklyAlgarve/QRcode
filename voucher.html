<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Your Welcome Reward</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="voucher.css">

</head>

<body>

<div class="container">

    <img src="lokly-logo.png" class="logo" alt="Lokly">

    <div class="success">

        🎉

    </div>

    <h1>
        Your Welcome Reward is Ready!
    </h1>

    <p class="intro">

        Thank you for supporting a local business.

        <br><br>

        Please show this reward to your server before ordering.

    </p>

    <div class="voucher">

        <div class="voucher-title">

            WELCOME REWARD

        </div>

        <h2>

            O Folclore Welcome Reward

        </h2>

        <hr>

        <div class="details">

            <p>
                <span>Restaurant</span>
                <strong>O Folclore</strong>
            </p>

            <p>
                <span>Reward</span>
                <strong>Welcome Dining Reward</strong>
            </p>

            <p>
                <span>Voucher</span>
                <strong id="voucherNumber"></strong>
            </p>

            <p>
                <span>Valid</span>
                <strong>Today Only</strong>
            </p>

        </div>

    </div>

    <button class="continue" onclick="window.location.href='index.html'">

        Done

    </button>

</div>

<script src="voucher.js"></script>

</body>

</html>
